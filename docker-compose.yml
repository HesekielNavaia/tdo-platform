version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: tdo_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama
    # Pull Phi-4 on first run: docker exec ollama ollama pull phi4
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    command: --model-id intfloat/multilingual-e5-large
    ports:
      - "8080:80"
    volumes:
      - embeddings_cache:/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
      embeddings:
        condition: service_started
      minio:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/tdo_dev
      BLOB_ENDPOINT: http://minio:9000
      EMBEDDING_ENDPOINT: http://embeddings:80
      LLM_ENDPOINT: http://ollama:11434
      EMBEDDING_DIM: "1024"
      TDO_API_KEYS: "dev-key-123"
    ports:
      - "8000:8000"
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  ollama_data:
  embeddings_cache:
  minio_data:
