name: Deploy Infrastructure

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read

env:
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  AZURE_RESOURCE_GROUP: 'tdo-platform-dev'
  AZURE_LOCATION: 'northeurope'
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ADMIN_OBJECT_ID: ${{ secrets.ADMIN_OBJECT_ID }}

jobs:
  lint:
    name: Bicep Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Bicep CLI
        run: az bicep install
      - name: Lint main.bicep
        run: az bicep lint --file infra/main.bicep

  what-if:
    name: What-If Analysis
    needs: lint
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login (OIDC)
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      - name: Run what-if
        run: |
          az deployment group what-if \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/parameters/dev.bicepparam \
            --parameters tenantId=${{ env.AZURE_TENANT_ID }} \
            --parameters administratorObjectId=${{ env.ADMIN_OBJECT_ID }} \
            --parameters initialDeploy=false

  deploy-dev:
    name: Deploy to Dev
    needs: what-if
    runs-on: ubuntu-latest
    environment: dev
    if: github.event.inputs.environment != 'prod' && github.event.inputs.environment != 'staging'
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login (OIDC)
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/parameters/dev.bicepparam \
            --parameters tenantId=${{ env.AZURE_TENANT_ID }} \
            --parameters administratorObjectId=${{ env.ADMIN_OBJECT_ID }} \
            --parameters environment=dev \
            --parameters initialDeploy=false

  deploy-staging:
    name: Deploy to Staging
    needs: what-if
    runs-on: ubuntu-latest
    environment: staging
    if: github.event.inputs.environment == 'staging'
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login (OIDC)
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group tdo-platform-staging \
            --template-file infra/main.bicep \
            --parameters infra/parameters/dev.bicepparam \
            --parameters tenantId=${{ env.AZURE_TENANT_ID }} \
            --parameters administratorObjectId=${{ env.ADMIN_OBJECT_ID }} \
            --parameters environment=staging \
            --parameters initialDeploy=false

  deploy-prod:
    name: Deploy to Production
    needs: what-if
    runs-on: ubuntu-latest
    environment: prod  # requires manual approval in GitHub environment settings
    if: github.event.inputs.environment == 'prod'
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login (OIDC)
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group tdo-platform-prod \
            --template-file infra/main.bicep \
            --parameters infra/parameters/dev.bicepparam \
            --parameters tenantId=${{ env.AZURE_TENANT_ID }} \
            --parameters administratorObjectId=${{ env.ADMIN_OBJECT_ID }} \
            --parameters environment=prod \
            --parameters initialDeploy=false
