name: Deploy Application

on:
  push:
    branches:
      - main
  workflow_run:
    workflows:
      - Deploy Infrastructure
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

env:
  AZURE_SUBSCRIPTION_ID: '2984fe6f-916e-4ab1-ba5d-c34cdf8f9dd8'
  AZURE_RESOURCE_GROUP: 'tdo-platform-dev'
  AZURE_TENANT_ID: 'e078eae9-f34e-495c-b095-7e1648269606'
  AZURE_CLIENT_ID: '95e0befa-a09a-43ea-acc9-8294ea2bf104'
  IMAGE: 'ghcr.io/hesekielnavaia/tdo-api'
  ACR_IMAGE: 'tdoacrdev.azurecr.io/tdo-api'

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
      acr-image-tag: ${{ steps.meta.outputs.acr-tag }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: tdoacrdev.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          echo "tag=${{ env.IMAGE }}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "acr-tag=${{ env.ACR_IMAGE }}:${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE }}:latest
            ${{ steps.meta.outputs.acr-tag }}
            ${{ env.ACR_IMAGE }}:latest

  deploy:
    name: Update Container App
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Restore required secrets
        run: |
          az containerapp secret set \
            --name tdo-app-api-dev \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --secrets \
              "tdo-api-keys=${{ secrets.TDO_API_KEYS }}" \
              "embedder-endpoint=${{ secrets.EMBEDDER_ENDPOINT }}" \
              "embedder-key=${{ secrets.EMBEDDER_KEY }}" \
              "openai-endpoint=${{ secrets.OPENAI_ENDPOINT }}" \
              "openai-key=${{ secrets.OPENAI_KEY }}"

      - name: Update Container App revision
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          DEPLOY_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          az containerapp update \
            --name tdo-app-api-dev \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.IMAGE }}:${SHORT_SHA} \
            --set-env-vars \
              "GIT_SHA=${SHORT_SHA}" \
              "DEPLOY_TIME=${DEPLOY_TIME}" \
              "TDO_API_KEYS=secretref:tdo-api-keys" \
              "EMBEDDING_ENDPOINT=secretref:embedder-endpoint" \
              "EMBEDDING_API_KEY=secretref:embedder-key" \
              "OPENAI_ENDPOINT=secretref:openai-endpoint" \
              "OPENAI_API_KEY=secretref:openai-key"

      - name: Update harvest job template image
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)
          # Configure ACR registry credentials on job first (required to pull private image)
          az containerapp job registry set \
            --name tdo-job-harvest-dev \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --server tdoacrdev.azurecr.io \
            --username ${{ secrets.ACR_USERNAME }} \
            --password ${{ secrets.ACR_PASSWORD }} || true
          az containerapp job update \
            --name tdo-job-harvest-dev \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_IMAGE }}:${SHORT_SHA} \
            --set-env-vars "JOB_NAME=harvest" || true

      - name: Smoke test
        run: |
          APP_URL=$(az containerapp show \
            --name tdo-app-api-dev \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          curl -sf "https://${APP_URL}/v1/health" || exit 1
          echo "Smoke test passed: https://${APP_URL}/v1/health"
