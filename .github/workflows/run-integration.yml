name: Integration Tests

on:
  schedule:
    - cron: '0 2 * * *'  # Nightly at 2am UTC
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start docker-compose test stack
        run: docker compose -f docker-compose.test.yml up -d

      - name: Wait for services to be ready
        run: |
          echo "Waiting for PostgreSQL..."
          timeout 60 bash -c 'until docker compose -f docker-compose.test.yml exec -T postgres pg_isready -U postgres; do sleep 2; done'
          echo "Waiting for embeddings service..."
          timeout 120 bash -c 'until curl -sf http://localhost:8080/health; do sleep 5; done' || true
          echo "Services ready"

      - name: Run integration tests
        run: |
          python -m pytest tests/integration/test_full_pipeline.py -v --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/tdo_test
          EMBEDDING_ENDPOINT: http://localhost:8080
          EMBEDDING_DIM: '1024'
          LLM_ENDPOINT: http://localhost:11434

      - name: Stop docker-compose test stack
        if: always()
        run: docker compose -f docker-compose.test.yml down

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            .pytest_cache/
            *.xml
